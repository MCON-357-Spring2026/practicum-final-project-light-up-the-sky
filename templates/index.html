<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PyroPlanner</title>
    <style>
        :root {
            --accent: #ff4b4b; /* Firework Red */
            --bg: #121212;
            --card-bg: #1e1e1e;
            --text: #e0e0e0;
            --border: #333333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            padding: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 75, 75, 0.5);
        }

        .result-card {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            margin-bottom: 40px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        form {
            display: flex;
            gap: 15px;
            align-items: center;
            margin-top: 15px;
        }

        input[type="file"] {
            background: #2a2a2a;
            padding: 10px;
            border-radius: 6px;
            border: 1px dashed #555;
            flex-grow: 1;
        }

        button {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, background 0.2s;
        }

        button:hover {
            background: #ff3333;
            transform: translateY(-1px);
        }

        h2 {
            border-left: 4px solid var(--accent);
            padding-left: 15px;
            margin-top: 40px;
        }

        /* --- THE TABLE FIXES --- */
        table {
            width: 100%;
            border-collapse: collapse; /* Merges borders into single lines */
            margin-top: 20px;
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
        }

        th {
            background-color: #252525;
            color: #ffffff;
            text-align: left;
            padding: 15px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid var(--border);
        }

        td {
            padding: 15px;
            border-bottom: 1px solid var(--border);
            color: #ffffff;
            font-weight: 500; /* Ensures no columns are accidentally bold */
        }

        tr:last-child td {
            border-bottom: none; /* Removes the last line for a cleaner look */
        }

        tr:hover td {
            background-color: #252525; /* Subtle highlight on hover */
            color: white;
        }

    </style>
</head>
<body>

<h1>PyroPlanner</h1>

<div class="result-card">
    <h3>1. Upload Your Soundtrack</h3>
    <form action="/" method="post" enctype="multipart/form-data">
        <input type="file" name="music_file" accept=".mp3,.wav" required>
        <button type="submit">Analyze & Generate Show</button>
    </form>
</div>

{% if plan %}
<h2>Choreography Results</h2>
<table>
    <thead>
    <tr>
        <th>Segment</th>
        <th>Time (Start - End)</th>
        <th>Duration</th>
        <th>Pace</th>
        <th>Firework</th>
    </tr>
    </thead>
    <tbody>
    {% for item in plan %}
    <tr>
        <td>{{ item.Segment }}</td>
        <td>{{ item.Timestamp }}</td>
        <td>{{ item.Length }}</td>
        <td>{{ item.Pace }}</td>
        <td>{{ item.Firework }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endif %}

</body>
</html>
